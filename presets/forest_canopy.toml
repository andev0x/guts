# Guts Theme Preset
# Profile: Forest Canopy
# Base preset provides defaults; colors below use supported override keys only.
# Format: #RRGGBB

preset = "monochrome"

[colors]
# Core surfaces
background = "#0F1E17"
border = "#4ADE80"
header_background = "#1B2A22"
header_foreground = "#E6F4EA"
row_foreground = "#CDE6D4"

# Focus and match states
selected_background = "#166534"
selected_foreground = "#ECFDF5"
match_background = "#2A3C31"

# Status chips and info text
status_mode_foreground = "#052E16"
status_mode_background = "#86EFAC"
status_text_foreground = "#E6F4EA"
metrics_foreground = "#6EE7B7"
column_foreground = "#A7F3D0"
type_foreground = "#FDE68A"
source_foreground = "#9FB5A6"
help_foreground = "#9FB5A6"
input_prompt_foreground = "#86EFAC"
input_text_foreground = "#F0FDF4"
