# Guts Theme Preset
# Profile: Nord Classic
# Base preset provides defaults; colors below use supported override keys only.
# Format: #RRGGBB

preset = "nord"

[colors]
# Core surfaces
background = "#2E3440"
border = "#81A1C1"
header_background = "#3B4252"
header_foreground = "#ECEFF4"
row_foreground = "#D8DEE9"

# Focus and match states
selected_background = "#4C566A"
selected_foreground = "#EBCB8B"
match_background = "#434C5E"

# Status chips and info text
status_mode_foreground = "#2E3440"
status_mode_background = "#A3BE8C"
status_text_foreground = "#ECEFF4"
metrics_foreground = "#88C0D0"
column_foreground = "#81A1C1"
type_foreground = "#EBCB8B"
source_foreground = "#B0B8C6"
help_foreground = "#B0B8C6"
input_prompt_foreground = "#88C0D0"
input_text_foreground = "#ECEFF4"
